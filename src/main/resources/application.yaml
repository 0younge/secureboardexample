spring:
  application:
    name: secureboardexample
  datasource:
    url: jdbc:mysql://localhost:3306/secureboard?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

jwt:
  secret: secureboard-jwt-secret-key-for-local-development-2026-05-08-minimum-512-bit-length
  expiration: 3600000
